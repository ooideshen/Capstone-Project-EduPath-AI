services:
  - type: web
    name: edupath-ai-backend
    env: docker
    plan: free
    dockerContext: backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: edupath-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: edupath-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: edupath-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: edupath-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: edupath-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: edupath-db
    databaseName: edupath_ai_db
    plan: free

